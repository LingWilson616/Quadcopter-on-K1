# ROS2 parameter file for K1 Drone
# Loaded via launch file. Override with --ros-args -p <param>:=<value>

camera_node:
  ros__parameters:
    camera_device: "/dev/video20"
    camera_format: "MJPG"
    image_width: 1280
    image_height: 720
    fps: 25

inference_node:
  ros__parameters:
    model_path: "/home/bianbu/spacemit-demo/examples/CV/yolov8/model/yolov8n_320x320.q.onnx"
    confidence_threshold: 0.3
    iou_threshold: 0.45
    num_threads: 4
    person_only: true

mavlink_node:
  ros__parameters:
    uart_device: "/dev/ttyS0"
    baud_rate: 57600
